name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Clean previous build files
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          Remove-Item -Force EzPainter.spec -ErrorAction SilentlyContinue

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --icon="logos/EzPainter_logo.ico" `
            --add-data="logos/EzPainter_logo.ico:logos" `
            --name "EzPainter" `
            main.py

      - name: Rename Windows executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/EzPainter.exe")) {
            Write-Error "dist/EzPainter.exe was not generated."
            exit 1
          }

          Move-Item `
            "dist/EzPainter.exe" `
            "dist/EzPainter_Windows_x64.exe"

      - name: Verify Windows artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/EzPainter_Windows_x64.exe")) {
            Write-Error "Windows release file was not generated."
            exit 1
          }

          Get-ChildItem dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/EzPainter_Windows_x64.exe
          if-no-files-found: error
          retention-days: 7

  build-macos-intel:
    name: Build macOS Intel
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Verify build architecture
        shell: bash
        run: |
          echo "System architecture:"
          uname -m

          echo "Python architecture:"
          python -c "import platform; print(platform.machine())"

          if [ "$(uname -m)" != "x86_64" ]; then
            echo "::error::This workflow is not running on an Intel x86_64 runner."
            exit 1
          fi

      - name: Clean previous build files
        shell: bash
        run: |
          rm -rf build
          rm -rf dist
          rm -f EzPainter.spec

      - name: Build macOS Intel application
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --onedir \
            --windowed \
            --icon="logos/EzPainter_logo.icns" \
            --add-data="logos/EzPainter_logo.icns:logos" \
            --name "EzPainter" \
            main.py

      - name: Verify macOS application
        shell: bash
        run: |
          if [ ! -d "dist/EzPainter.app" ]; then
            echo "::error::dist/EzPainter.app was not generated."
            exit 1
          fi

          EXECUTABLE="dist/EzPainter.app/Contents/MacOS/EzPainter"

          if [ ! -f "$EXECUTABLE" ]; then
            echo "::error::macOS executable was not generated."
            exit 1
          fi

          echo "macOS executable information:"
          file "$EXECUTABLE"

          if ! file "$EXECUTABLE" | grep -q "x86_64"; then
            echo "::error::The generated executable is not x86_64."
            exit 1
          fi

      - name: Compress macOS app
        shell: bash
        run: |
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "dist/EzPainter.app" \
            "dist/EzPainter_macOS_Intel.app.zip"

      - name: Prepare DMG contents
        shell: bash
        run: |
          rm -rf dmg-root
          mkdir -p dmg-root

          cp -R "dist/EzPainter.app" "dmg-root/EzPainter.app"
          ln -s /Applications "dmg-root/Applications"

          echo "DMG contents:"
          ls -lah dmg-root

      - name: Generate macOS Intel DMG
        shell: bash
        run: |
          rm -f "dist/EzPainter_macOS_Intel.dmg"

          hdiutil create \
            -volname "EzPainter" \
            -srcfolder "dmg-root" \
            -ov \
            -format UDZO \
            "dist/EzPainter_macOS_Intel.dmg"

      - name: Verify macOS release files
        shell: bash
        run: |
          APP_ZIP="dist/EzPainter_macOS_Intel.app.zip"
          DMG_FILE="dist/EzPainter_macOS_Intel.dmg"

          if [ ! -f "$APP_ZIP" ]; then
            echo "::error::$APP_ZIP was not generated."
            exit 1
          fi

          if [ ! -f "$DMG_FILE" ]; then
            echo "::error::$DMG_FILE was not generated."
            exit 1
          fi

          echo "macOS release files:"
          ls -lah dist

          echo "DMG information:"
          hdiutil imageinfo "$DMG_FILE"

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-release
          path: |
            dist/EzPainter_macOS_Intel.app.zip
            dist/EzPainter_macOS_Intel.dmg
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs:
      - build-windows
      - build-macos-intel

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets/windows

      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-release
          path: release-assets/macos-intel

      - name: Display release files
        shell: bash
        run: |
          echo "Release assets:"
          find release-assets -type f -maxdepth 3 -print

          test -f \
            "release-assets/windows/EzPainter_Windows_x64.exe"

          test -f \
            "release-assets/macos-intel/EzPainter_macOS_Intel.app.zip"

          test -f \
            "release-assets/macos-intel/EzPainter_macOS_Intel.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/EzPainter_Windows_x64.exe
            release-assets/macos-intel/EzPainter_macOS_Intel.app.zip
            release-assets/macos-intel/EzPainter_macOS_Intel.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
